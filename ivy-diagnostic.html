.q-num{font-size:12px;font-weight:800;color:#FACC15;margin-right:8px}

.opt{padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);color:#D1D5DB;font-size:13px;line-height:1.5;font-weight:500;text-align:left;cursor:pointer;transition:all .15s}
.opt:hover{border-color:rgba(250,204,21,.45)}
.opt.active{background:rgba(250,204,21,.16);border-color:rgba(250,204,21,.75);color:#FFF8DC;font-weight:700}
.opt .check{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:4px;border:2px solid rgba(255,255,255,.26);margin-right:10px;font-size:11px;font-weight:900;vertical-align:-2px;color:#111}
.opt.active .check{border-color:var(--yellow);background:var(--yellow)}

.test-foot{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:980px;background:rgba(12,15,20,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;gap:12px;z-index:40}

.next{padding:11px 22px;border:none;border-radius:10px;font-size:13px;font-weight:800;background:var(--yellow);color:#111;box-shadow:0 3px 0 var(--yellow-deep);cursor:pointer}

.results{padding:24px 20px 32px}
.r-head{text-align:center;margin-bottom:22px}
.r-head h1{font-size:clamp(28px,4vw,38px);line-height:1.15;font-weight:800;margin-bottom:10px}
.panel{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:18px 16px;margin-bottom:14px}
.score-wrap{text-align:center;position:relative;overflow:hidden}
.score-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--tier,#FACC15),transparent)}
.score-num{font-size:72px;line-height:1;font-weight:800;color:var(--tier,#FACC15)}
.score-pill{display:inline-block;margin:10px 0 12px;padding:6px 14px;border-radius:999px;border:1px solid color-mix(in srgb,var(--tier,#FACC15) 45%, transparent);background:color-mix(in srgb,var(--tier,#FACC15) 16%, transparent);font-size:13px;font-weight:800;color:var(--tier,#FACC15)}
.score-desc{font-size:14px;line-height:1.7;color:#CBD5E1;max-width:700px;margin:0 auto}

.panel h3{font-size:19px;font-weight:800;color:#F8FAFC;margin-bottom:12px}
.dbar{display:grid;grid-template-columns:170px 1fr 44px;gap:10px;align-items:center;padding:6px 0}

.dval{font-size:13px;font-weight:800;text-align:right}
.legend{display:flex;justify-content:center;gap:14px;margin-top:10px;font-size:11px;color:#94A3B8;flex-wrap:wrap}

.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.item-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.item-row:last-child{border-bottom:none}
.good{color:#16A34A;font-weight:800}
.bad{color:#EF4444;font-weight:800}

.tier-row{padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tier-row:last-child{border-bottom:none}
.tier-title{font-size:12px;font-weight:800;color:#FACC15;letter-spacing:.03em;margin-bottom:4px;text-transform:uppercase}

.todo{display:flex;flex-direction:column;gap:9px}

.todo-title{font-size:14px;font-weight:700;color:#F8FAFC;margin-bottom:2px}
.todo-desc{font-size:12.5px;color:#CBD5E1;line-height:1.55}

.small{font-size:12.5px;color:#94A3B8;line-height:1.75}
.retake{text-align:center;margin-top:8px}

.page-foot{margin-top:14px;text-align:center;font-size:12px;color:rgba(255,255,255,.5)}

}

function computeSectionScore(section, answers) {
  let totalPossible = 0;
  let totalEarned = 0;

  for (const q of section.questions) {
    if (q.type === "single") {
      const maxVal = Math.max(...q.options.map((o) => o.value));
      totalPossible += maxVal;
      totalEarned += answers[q.id] || 0;
    } else if (q.type === "multi") {
      totalPossible += q.maxScore;
      const selected = answers[q.id] || [];
      const sum = Math.min(selected.reduce((a, b) => a + b, 0), q.maxScore);
      totalEarned += sum;
    }
  }

  return totalPossible > 0 ? totalEarned / totalPossible : 0;
}

function computeOverallScore(answers) {
  const sectionScores = {};
  let weighted = 0;

  for (const sec of SECTIONS) {
    const score = computeSectionScore(sec, answers);
    sectionScores[sec.id] = Math.round(score * 100);
    weighted += score * sec.weight;
  }

  const overall = Math.round(weighted * 100);
  return { overall, sectionScores };
}

function getTier(score) {
  if (score >= 82) return { tier: "Strong Ivy Contender", color: "#16A34A", emoji: "🟢", desc: "Your profile has the raw ingredients for a compelling Ivy application. At this level, execution (essays, recommendations, school fit) becomes the deciding factor. No one is 'guaranteed' at these schools — even perfect profiles face 4-6% acceptance rates — but you're competing with real strength." };
  if (score >= 70) return { tier: "Competitive — Within Range", color: "#CA8A04", emoji: "🟡", desc: "You have a solid foundation and are within the competitive range for Ivy-caliber schools. The gap between you and stronger applicants is closeable — focus on the specific weaknesses identified below. Your outcome will depend heavily on narrative clarity, essay execution, and strategic school selection." };
  if (score >= 58) return { tier: "Developing — Targeted Work Needed", color: "#EA580C", emoji: "🟠", desc: "You have real strengths but meaningful gaps. An Ivy admit is possible if you address the areas below aggressively. Consider a balanced list that includes strong T20-T30 schools where your profile may be more competitive. The 'contextual factors' section matters more at this range — hooks and institutional priorities can tip the scale." };
  if (score >= 42) return { tier: "Building Foundation — Significant Gaps", color: "#DC2626", emoji: "🔴", desc: "Your profile has potential but needs substantial development before it's competitive at the most selective schools. Focus on building depth in 1-2 areas rather than spreading thin. A realistic and ambitious school list should include T30-T50 schools as primary targets, with Ivies as aspirational reaches." };
  return { tier: "Early Stage — Major Development Needed", color: "#991B1B", emoji: "⚫", desc: "You're in the early stages of building a competitive profile. This isn't a judgment on your potential — it's a snapshot of where things stand today. The good news: many of these areas are improvable with focused effort and strategic guidance. Start with academics and one deep extracurricular commitment." };
}

function getStrengthsAndGaps(sectionScores) {
  const labels = {
    academic: "Academic Foundation",
    intellectual: "Intellectual Vitality",
    extracurricular: "Extracurricular Impact",
    narrative: "Personal Narrative & Spike",
    execution: "Application Execution",
    context: "Contextual Positioning",
  };
  const sorted = Object.entries(sectionScores).sort((a, b) => b[1] - a[1]);
  const strengths = sorted.filter(([, v]) => v >= 65).slice(0, 3).map(([k, v]) => ({ label: labels[k], score: v }));
  const gaps = sorted.filter(([, v]) => v < 65).reverse().slice(0, 3).map(([k, v]) => ({ label: labels[k], score: v }));
  return { strengths, gaps };
}

function getSchoolTiers(overall) {
  if (overall >= 82) return [
    { tier: "Strong Reach (still low odds)", schools: "Harvard, Princeton, Yale, Stanford, MIT" },
    { tier: "Competitive Reach", schools: "Columbia, Penn, Brown, Dartmouth, Duke, Chicago" },

  if (overall >= 58) return [

}

const app = document.getElementById("app");

function isAnswered(q) {
  if (q.type === "multi") return Array.isArray(state.answers[q.id]) && state.answers[q.id].length > 0;
  return state.answers[q.id] !== undefined;
}

function getAnsweredCount() {
  let count = 0;
  for (const sec of SECTIONS) {
    for (const q of sec.questions) {
      if (isAnswered(q)) count += 1;
    }
  }
  return count;
}

function isSectionComplete(idx) {
  return SECTIONS[idx].questions.every((q) => isAnswered(q));
}

function getGlobalIndex(secIdx, qIdx) {
  let count = 0;
  for (let i = 0; i < secIdx; i++) count += SECTIONS[i].questions.length;
  return count + qIdx + 1;
}

function scrollTopSmooth() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function scrollToQuestions() {
  const qWrap = document.querySelector(".questions");
  if (!qWrap) return;
  const first = qWrap.querySelector(".q");
  const navH = document.querySelector(".nav")?.offsetHeight || 56;
  const headH = document.querySelector(".test-head")?.offsetHeight || 0;
  const anchor = first || qWrap;
  const target = anchor.getBoundingClientRect().top + window.scrollY - navH - headH - 24;
  const doScroll = () => window.scrollTo({ top: Math.max(0, target), behavior: "auto" });
  requestAnimationFrame(doScroll);
  setTimeout(doScroll, 80);
  setTimeout(doScroll, 180);
}

  const activeClass = isActive ? "active" : "";
  if (q.type === "multi") {
    return `<button class="opt ${activeClass}" data-action="toggle-multi" data-qid="${q.id}" data-value="${opt.value}"><span class="check">${isActive ? "✓" : ""}</span>${opt.label}</button>`;
  }
  return `<button class="opt ${activeClass}" data-action="pick-single" data-qid="${q.id}" data-value="${opt.value}">${opt.label}</button>`;
}

function renderTest() {
  const sec = SECTIONS[state.sectionIdx];
  const totalQuestions = SECTIONS.reduce((s, s2) => s + s2.questions.length, 0);
  const answered = getAnsweredCount();
  const pct = Math.round((answered / totalQuestions) * 100);
  const complete = isSectionComplete(state.sectionIdx);

  app.innerHTML = `
    <section class="test-head">
      <div class="test-top">
        <div>
          <p class="kicker">Section ${state.sectionIdx + 1} of ${SECTIONS.length}</p>
          <h2>${sec.title}</h2>
        </div>
        <div class="dots">
          ${SECTIONS.map((_, i) => `<span class="dot ${i < state.sectionIdx ? "done" : i === state.sectionIdx ? "active" : ""}"></span>`).join("")}
        </div>
      </div>
      <p class="test-sub">${sec.description}</p>
      <div class="prog-meta"><span>${answered} / ${totalQuestions} answered</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </section>

    <section class="questions">
      ${sec.questions.map((q, qi) => {
        const value = state.answers[q.id];
        const multiValues = Array.isArray(value) ? value : [];
        return `
          <article class="q">
            <p class="q-text"><span class="q-num">${getGlobalIndex(state.sectionIdx, qi)}.</span>${q.text}</p>
            ${q.type === "multi" ? `<p class="q-help">Select all that apply</p>` : ""}
            <div class="opts">
              ${q.options.map((opt) => {
                const isActive = q.type === "multi" ? multiValues.includes(opt.value) : value === opt.value;
                return optionButtonHTML(q, opt, isActive);
              }).join("")}
            </div>
          </article>
        `;
      }).join("")}
    </section>

    <div class="test-foot">
      <button class="ghost" data-action="back">← Back</button>
      <button class="next ${complete ? "" : "disabled"}" data-action="next">${state.sectionIdx < SECTIONS.length - 1 ? "Next Section →" : "See Results →"}</button>
    </div>
  `;
}

function dimColor(score) {
  if (score >= 75) return "var(--green)";
  if (score >= 60) return "var(--amber)";
  if (score >= 45) return "var(--orange)";
  return "var(--red)";
}

function renderResults() {
  const { overall, sectionScores, tier, strengths, gaps, schoolTiers } = state.results;
  const dimLabels = {
    academic: "Academic Foundation",
    intellectual: "Intellectual Vitality",
    extracurricular: "Extracurricular Impact",
    narrative: "Personal Narrative",
    execution: "Application Execution",
    context: "Contextual Profile",
  };

  const todoItems = [
    gaps.length > 0 ? { icon: "🎯", title: `Shore up: ${gaps[0].label}`, desc: `Your lowest dimension is ${gaps[0].score}/100. This is the highest-leverage improvement area.` } : null,
    sectionScores.narrative < 70 ? { icon: "📝", title: "Crystallize your narrative", desc: "Define your one-sentence identity. Your activities, essays, and goals should point in the same direction." } : null,
    sectionScores.execution < 70 ? { icon: "⏰", title: "Upgrade execution", desc: "Start essays, refine activity descriptions, and lock recommendation strategy early." } : null,
    sectionScores.intellectual < 70 ? { icon: "🔬", title: "Show intellectual vitality", desc: "Build clear evidence of curiosity through independent projects, reading depth, or mentored work." } : null,
    sectionScores.extracurricular < 70 ? { icon: "📈", title: "Increase impact depth", desc: "Concentrate on 1-2 core activities and drive measurable outcomes." } : null,
    { icon: "📋", title: "Build a balanced list", desc: "Use reach/target/likely buckets and include genuine-fit programs at each tier." },
    { icon: "🗓️", title: "Set a timeline", desc: "Map essays, testing, letters, and submissions across months so quality doesn't collapse at the end." },
  ].filter(Boolean);

  app.innerHTML = `
    <section class="results">
      <div class="r-head">
        <p class="kicker">Diagnostic Complete</p>
        <h1>Your Ivy Readiness Profile</h1>
      </div>

      <article class="panel score-wrap" style="--tier:${tier.color}">
        <div class="score-num">${overall}</div>
        <p style="font-size:12px;color:#94A3B8;margin-top:2px">out of 100</p>
        <p class="score-pill">${tier.emoji} ${tier.tier}</p>
        <p class="score-desc">${tier.desc}</p>
      </article>

      <article class="panel">
        <h3>Dimension Breakdown</h3>
        ${SECTIONS.map((s) => {
          const sc = sectionScores[s.id];
          const color = dimColor(sc);
          return `
            <div class="dbar">
              <div class="dlabel">${dimLabels[s.id]}</div>
              <div class="dtrack"><div class="dfill" style="width:${Math.max(sc, 2)}%;background:${color}"></div></div>
              <div class="dval" style="color:${color}">${sc}</div>
            </div>
          `;
        }).join("")}
        <div class="legend">
          <span><span class="dotc" style="background:#16A34A"></span>75+</span>
          <span><span class="dotc" style="background:#CA8A04"></span>60-74</span>
          <span><span class="dotc" style="background:#EA580C"></span>45-59</span>
          <span><span class="dotc" style="background:#DC2626"></span>&lt;45</span>
        </div>
      </article>

      <div class="two">
        <article class="panel">
          <h3 style="color:#22C55E">Top Strengths</h3>
          ${strengths.length ? strengths.map((s) => `<div class="item-row"><span>${s.label}</span><strong class="good">${s.score}</strong></div>`).join("") : `<p class="small">No major strengths surfaced yet. Keep building depth and consistency.</p>`}
        </article>
        <article class="panel">
          <h3 style="color:#EF4444">Critical Gaps</h3>
          ${gaps.length ? gaps.map((g) => `<div class="item-row"><span>${g.label}</span><strong class="bad">${g.score}</strong></div>`).join("") : `<p class="small">No critical gaps detected. Focus now on execution quality and school fit.</p>`}
        </article>
      </div>

      <article class="panel">
        <h3>School List Strategy</h3>
        <p class="small" style="margin-bottom:10px">These are directional buckets based on readiness score. Final school fit still depends on major, context, and application quality.</p>
        ${schoolTiers.map((st) => `<div class="tier-row"><p class="tier-title">${st.tier}</p><p class="tier-schools">${st.schools}</p></div>`).join("")}
      </article>

      <article class="panel">
        <h3>What To Do Next</h3>
        <div class="todo">
          ${todoItems.map((item) => `
            <div class="todo-item">
              <span class="todo-ico">${item.icon}</span>
              <div>
                <p class="todo-title">${item.title}</p>
                <p class="todo-desc">${item.desc}</p>
              </div>
            </div>
          `).join("")}
        </div>
      </article>

      <article class="panel">
        <h3>Important Context</h3>
        <div class="small">
          <p><strong style="color:#E5E7EB">This is a diagnostic, not a guarantee.</strong> Ivy outcomes include randomness, institutional priorities, and reader subjectivity.</p>
          <p><strong style="color:#E5E7EB">Self-reported answers can be biased.</strong> Use this as an honest baseline and review it with an advisor who knows your full profile.</p>
          <p><strong style="color:#E5E7EB">Method basis:</strong> weights and dimensions align with published holistic review patterns, Common Data Sets, and admissions research cited in the original diagnostic.</p>
        </div>
      </article>

      <div class="retake">
        <button class="ghost" data-action="retake">↺ Retake Diagnostic</button>
      </div>
    </section>
  `;
}

function render() {
  if (state.page === "intro") return renderIntro();
  if (state.page === "test") return renderTest();
  if (state.page === "results") return renderResults();
}

function preserveScroll(updateFn) {
  const y = window.scrollY;
  updateFn();
  window.scrollTo(0, y);
}

document.addEventListener("click", (e) => {
  const target = e.target.closest("[data-action]");
  if (!target) return;
  const action = target.getAttribute("data-action");

  if (action === "start") {
    state.page = "test";
    state.sectionIdx = 0;
    render();
    scrollToQuestions();
    return;
  }

  if (action === "pick-single") {
    const qid = target.getAttribute("data-qid");
    const value = Number(target.getAttribute("data-value"));
    preserveScroll(() => {
      state.answers[qid] = value;
      render();
    });
    return;
  }

  if (action === "toggle-multi") {
    const qid = target.getAttribute("data-qid");
    const value = Number(target.getAttribute("data-value"));
    preserveScroll(() => {
      const prev = Array.isArray(state.answers[qid]) ? [...state.answers[qid]] : [];
      const idx = prev.indexOf(value);
      if (idx >= 0) prev.splice(idx, 1);
      else prev.push(value);
      if (prev.length === 0) delete state.answers[qid];
      else state.answers[qid] = prev;
      render();
    });
    return;
  }

  if (action === "back") {
    if (state.sectionIdx > 0) {
      state.sectionIdx -= 1;
      render();
      scrollToQuestions();
    } else {
      state.page = "intro";
      render();
      scrollTopSmooth();
    }
    return;
  }

  if (action === "next") {
    if (!isSectionComplete(state.sectionIdx)) {
      alert("Please answer all questions in this section.");
      return;
    }
    if (state.sectionIdx < SECTIONS.length - 1) {
      state.sectionIdx += 1;
      render();
      scrollToQuestions();
    } else {
      const { overall, sectionScores } = computeOverallScore(state.answers);
      const tier = getTier(overall);
      const { strengths, gaps } = getStrengthsAndGaps(sectionScores);
      const schoolTiers = getSchoolTiers(overall);
      state.results = { overall, sectionScores, tier, strengths, gaps, schoolTiers };
      state.page = "results";
      render();
      scrollTopSmooth();
    }
    return;
  }

  if (action === "retake") {
    state.page = "intro";
    state.sectionIdx = 0;
    state.answers = {};
    state.results = null;
    render();
    scrollTopSmooth();
  }
});

render();
</script>
<script>
(() => {
  const toggle = document.querySelector(".nav-toggle");
  const links = document.querySelector(".nav-links");
  if (!toggle || !links) return;
  if (toggle.dataset.navBound === "1") return;
  toggle.dataset.navBound = "1";

  const closeMenu = () => {
    links.classList.remove("open");
    toggle.classList.remove("open");
    document.body.classList.remove("nav-open");
  };

  toggle.addEventListener("click", () => {
    const willOpen = !links.classList.contains("open");
    if (willOpen) {
      links.classList.add("open");
      toggle.classList.add("open");
      document.body.classList.add("nav-open");
    } else {
      closeMenu();
    }
  });

  links.querySelectorAll("a").forEach((a) => a.addEventListener("click", closeMenu));
  window.addEventListener("resize", () => { if (window.innerWidth > 768) closeMenu(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeMenu(); });
})();
</script>
</body>
</html>
