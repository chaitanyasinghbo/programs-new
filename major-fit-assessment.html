  { name: "Philosophy", riasec: { I: 5, A: 3 }, strengths: { Verbal: 5, Quantitative: 2 }, env: { depth: 5, reading: 5, autonomy: 4 } },
  { name: "Journalism / Communications", riasec: { A: 3, E: 3, S: 3 }, strengths: { Verbal: 5, Social: 3 }, env: { communication: 5, practical: 3, risktolerance: 3 } },
  { name: "International Relations", riasec: { E: 4, S: 3, I: 3 }, strengths: { Verbal: 4, Social: 3 }, env: { reading: 4, impact: 4, communication: 3 } },
  { name: "Supply Chain / Operations", riasec: { C: 5, E: 3, R: 2 }, strengths: { Quantitative: 3, Execution: 5 }, env: { structure: 5, practical: 4 } },
  { name: "Biotechnology", riasec: { I: 5, R: 3, E: 2 }, strengths: { Quantitative: 4, Spatial: 2 }, env: { lab: 5, depth: 4, practical: 3 } },
  { name: "Neuroscience", riasec: { I: 5, S: 2, R: 2 }, strengths: { Quantitative: 3, Verbal: 3 }, env: { lab: 4, depth: 5, reading: 4 } },
  { name: "Music", riasec: { A: 5, I: 2, S: 2 }, strengths: { Creative: 5, Spatial: 2 }, env: { autonomy: 4, depth: 4 } },
  { name: "Anthropology / Sociology", riasec: { S: 4, I: 4, A: 2 }, strengths: { Verbal: 4, Social: 3 }, env: { reading: 4, depth: 4, impact: 3 } },
  { name: "Linguistics", riasec: { I: 5, A: 3, S: 2 }, strengths: { Verbal: 5, Quantitative: 2 }, env: { depth: 5, reading: 4, autonomy: 3 } },
  { name: "Actuarial Science", riasec: { C: 5, I: 4 }, strengths: { Quantitative: 5, Execution: 5 }, env: { structure: 5, depth: 3 } },
  { name: "Aerospace Engineering", riasec: { R: 4, I: 5, C: 2 }, strengths: { Quantitative: 5, Spatial: 5 }, env: { lab: 4, depth: 5, longterm: 4 } },
  { name: "Pharmacy", riasec: { I: 4, S: 3, C: 3 }, strengths: { Quantitative: 3, Execution: 4 }, env: { structure: 4, practical: 4, impact: 3 } },
];

const SCALE_LABELS = ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"];

const state = {
  page: "intro",
  section: 0,
  answers: {},
  userName: "",
  results: null,
};

const sections = [
  { title: "Part 1 - Interests", description: "Rate how much each statement describes you, regardless of what others expect." },
  { title: "Part 2 - Strengths", description: "Assess your natural learning advantages and cognitive strengths." },
  { title: "Part 3 - Study Style", description: "These questions help us match you to the right academic environment." },
];

const app = document.getElementById("app");

function getTopN(obj, n) {
  return Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n);
}

function computeRIASEC(answers) {
  const scores = {};
  for (const key of Object.keys(RIASEC_ITEMS)) {
    let sum = 0;
    RIASEC_ITEMS[key].forEach((_, i) => {
      sum += answers[`riasec_${key}_${i}`] || 0;
    });
    scores[key] = sum;
  }
  return scores;
}

function computeStrengths(answers) {
  const scores = {};
  for (const key of Object.keys(STRENGTH_ITEMS)) {
    let sum = 0;
    STRENGTH_ITEMS[key].forEach((_, i) => {
      sum += answers[`str_${key}_${i}`] || 0;
    });
    scores[key] = sum;
  }
  return scores;
}

function computeMotivation(answers) {
  const scores = {};
  for (const item of MOTIVATION_ITEMS) {
    let val = answers[`mot_${item.key}`] || 0;
    if (item.reverse) val = 6 - val;
    scores[item.key] = val;
  }
  return scores;
}

function determineAcademicType(riasec, strengths) {
  const topR = getTopN(riasec, 2).map(([k]) => k);
  const topS = getTopN(strengths, 2).map(([k]) => k);
  let bestType = null;
  let bestScore = -1;

  for (const [typeName, typeDef] of Object.entries(ACADEMIC_TYPES)) {
    let score = 0;
    typeDef.primary.forEach((p) => {
      if (topR[0] === p) score += 3;
      else if (topR[1] === p) score += 1.5;
    });
    typeDef.strengths.forEach((s) => {
      if (topS[0] === s) score += 2;
      else if (topS[1] === s) score += 1;
    });
    if (score > bestScore) {
      bestScore = score;
      bestType = typeName;
    }
  }
  return bestType;
}

function computeMajorFit(riasec, strengths, motivation) {
  const maxRiasec = 25;
  const maxStr = 15;

  return MAJOR_PROFILES.map((major) => {
    let interestMatch = 0;
    let interestMax = 0;
    for (const [k, w] of Object.entries(major.riasec)) {
      interestMatch += (riasec[k] / maxRiasec) * w;
      interestMax += w;
    }
    interestMatch = interestMax > 0 ? interestMatch / interestMax : 0;

    let strengthMatch = 0;
    let strengthMax = 0;
    for (const [k, w] of Object.entries(major.strengths)) {
      strengthMatch += (strengths[k] / maxStr) * w;
      strengthMax += w;
    }
    strengthMatch = strengthMax > 0 ? strengthMatch / strengthMax : 0;

    let envMatch = 0;
    let envMax = 0;
    if (major.env) {
      for (const [k, w] of Object.entries(major.env)) {
        envMatch += (((motivation[k] || 3) / 5) * w);
        envMax += w;
      }
    }
    envMatch = envMax > 0 ? envMatch / envMax : 0.5;

    const fit = 0.45 * interestMatch + 0.35 * strengthMatch + 0.20 * envMatch;
    return { name: major.name, fit: Math.round(fit * 100) };
  }).sort((a, b) => b.fit - a.fit);
}

function getSectionItems(sec) {
  if (sec === 0) {
    const items = [];
    for (const [key, qs] of Object.entries(RIASEC_ITEMS)) {
      qs.forEach((q, i) => items.push({ id: `riasec_${key}_${i}`, text: q }));
    }
    return items;
  }
  if (sec === 1) {
    const items = [];
    for (const [key, qs] of Object.entries(STRENGTH_ITEMS)) {
      qs.forEach((q, i) => items.push({ id: `str_${key}_${i}`, text: q }));
    }
    return items;
  }
  return MOTIVATION_ITEMS.map((m) => ({ id: `mot_${m.key}`, text: m.text }));
}

function isSectionComplete(sec) {
  return getSectionItems(sec).every((item) => state.answers[item.id]);
}

function getTotalAnswered() {
  return Object.keys(state.answers).length;
}

function computeResults() {
  const riasec = computeRIASEC(state.answers);
  const strengths = computeStrengths(state.answers);
  const motivation = computeMotivation(state.answers);
  const academicType = determineAcademicType(riasec, strengths);
  const majorFits = computeMajorFit(riasec, strengths, motivation);
  const topRiasec = getTopN(riasec, 3).map(([k]) => k).join("");
  state.results = { riasec, strengths, motivation, academicType, majorFits, topRiasec };
  state.page = "results";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function renderIntro() {
  app.innerHTML = `
    <section class="intro-head">
      <p class="intro-kicker">Blue Ocean Assessment</p>
      <h1>Major Fit <span>Assessment</span></h1>
      <p>This 60-question diagnostic evaluates your interests (RIASEC), strengths, and study preferences to recommend majors that actually fit your profile.</p>
      <div class="intro-stats">
        <span class="intro-chip">60 Questions</span>
        <span class="intro-chip">10-12 min</span>
        <span class="intro-chip">Instant Results</span>
      </div>
    </section>
    <section class="intro-body">
      <div class="input-wrap">
        <input class="name-input" id="name-input" type="text" maxlength="60" placeholder="Your name (optional)" value="${escapeHtml(state.userName)}">
      </div>
      <button class="primary-btn" data-action="begin">Begin Assessment →</button>
      <p class="intro-foot">Built on RIASEC interest mapping, cognitive strengths, and study-style alignment.</p>
    </section>
  `;
}

function renderTest() {
  const items = getSectionItems(state.section);
  const sectionInfo = sections[state.section];
  const canProceed = isSectionComplete(state.section);
  const offset = state.section === 1 ? 30 : state.section === 2 ? 48 : 0;

  app.innerHTML = `
    <section class="test-head">
      <p class="test-kicker">Academic Compass</p>
      <h2>${escapeHtml(sectionInfo.title)}</h2>
      <p class="test-desc">${escapeHtml(sectionInfo.description)}</p>
    </section>

    <section class="questions">
      ${items.map((item, idx) => {
        const value = state.answers[item.id] || 0;
        return `
          <article class="question">
            <p class="question-text"><span class="qn">${idx + 1 + offset}.</span>${escapeHtml(item.text)}</p>
            <div class="scale">
              ${[1,2,3,4,5].map((v) => `
                <button class="scale-btn ${value === v ? "active" : ""}" data-action="answer" data-id="${item.id}" data-value="${v}">
                  ${SCALE_LABELS[v - 1]}
                </button>
              `).join("")}
            </div>
          </article>
        `;
      }).join("")}
    </section>

    <div class="test-footer">
      <button class="secondary-btn" data-action="back">← Back</button>
      <button class="next-btn ${canProceed ? "" : "disabled"}" data-action="next">${state.section < 2 ? "Next Section →" : "See My Results →"}</button>
    </div>
  `;
}

function colorForFit(fit) {
  if (fit >= 75) return "#16A34A";
  if (fit >= 55) return "#CA8A04";
  return "#64748B";
}

function renderBarRows(entries, maxVal, colorMap) {
  return `
    <div class="bar-list">
      ${entries.map(([label, val]) => {
        const width = Math.max(2, Math.round((val / maxVal) * 100));
        const fill = colorMap && colorMap[label] ? colorMap[label] : "#111827";
        const valueColor = width >= 58 ? "#FFFFFF" : "#0F172A";
        return `
          <div class="bar-row">
            <div class="bar-label">${escapeHtml(label)}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${width}%;background:${fill}"></div>
              <span class="bar-value" style="color:${valueColor};text-shadow:${width >= 58 ? "0 1px 1px rgba(0,0,0,0.35)" : "none"}">${val}/${maxVal}</span>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderResults() {
  const { riasec, strengths, motivation, academicType, majorFits, topRiasec } = state.results;
  const typeData = ACADEMIC_TYPES[academicType];
  const topMajors = majorFits.slice(0, 12);
  const riasecEntries = Object.entries(riasec)
    .map(([k, v]) => [RIASEC_LABELS[k], v])
    .sort((a, b) => b[1] - a[1]);
  const strengthEntries = Object.entries(strengths).sort((a, b) => b[1] - a[1]);

  const labels = {
    meaning: "Purpose-Driven",
    meaning_r: "Purpose-Driven",
    depth: "Deep Learning",
    practical: "Practical Application",
    longterm: "Long-term Projects",
    structure: "Structured Environment",
    autonomy: "Self-Directed",
    reading: "Reading-Heavy",
    lab: "Lab / Hands-On",
    communication: "Presentation-Based",
    risktolerance: "Comfortable with Risk",
    impact: "Real-World Impact",
  };

  app.innerHTML = `
    <section class="results-wrap">
      <div class="results-head">
        <p class="results-kicker">Academic Compass - Results</p>
        <h1>${escapeHtml(state.userName ? `${state.userName}'s` : "Your")} Academic Profile</h1>
        <p>Holland Code: <strong style="color:#92400E;letter-spacing:.08em">${topRiasec}</strong></p>
      </div>

      <article class="block">
        <div class="type-row">
          <div class="type-icon">${typeData.icon}</div>
          <div>
            <p class="results-kicker" style="margin-bottom:4px">Your Academic Type</p>
            <h2 class="type-title">${escapeHtml(academicType)}</h2>
            <p class="type-desc">${escapeHtml(typeData.description)}</p>
          </div>
        </div>
      </article>

      <article class="block">
        <h3>Interest Profile (RIASEC)</h3>
        ${renderBarRows(riasecEntries, 25, RIASEC_COLORS)}
      </article>

      <article class="block">
        <h3>Cognitive Strengths</h3>
        ${renderBarRows(strengthEntries, 15)}
      </article>

      <article class="block">
        <h3>Top Major Recommendations</h3>
        <p style="font-size:12px;color:#64748B;line-height:1.6;margin-bottom:12px">Fit score combines interests (45%), strengths (35%), and study preferences (20%).</p>
        <div class="major-list">
          ${topMajors.map((m, i) => {
            const col = colorForFit(m.fit);
            return `
              <div class="major-item">
                <div class="rank">${i + 1}</div>
                <div class="major-name">${escapeHtml(m.name)}</div>
                <div class="fit-track"><div class="fit-fill" style="width:${m.fit}%;background:${col}"></div></div>
                <div class="fit-score" style="color:${col}">${m.fit}%</div>
              </div>
            `;
          }).join("")}
        </div>
      </article>

      <article class="block">
        <h3>Study Environment Preferences</h3>
        <div class="pref-chips">
          ${Object.entries(motivation)
            .sort((a, b) => b[1] - a[1])
            .map(([key, val]) => {
              const intensity = val >= 4 ? "high" : val >= 3 ? "medium" : "low";
              const label = labels[key] || key;
              return `<span class="pref-chip ${intensity}">${escapeHtml(label)}: ${val}/5</span>`;
            })
            .join("")}
        </div>
      </article>

      <p class="results-note">This assessment is a guided exploration tool based on RIASEC, strengths self-rating, and motivation preferences. Use this alongside professional counseling for final major decisions.</p>

      <div class="retake-wrap">
        <button class="secondary-btn" data-action="retake">↺ Retake Assessment</button>
      </div>
    </section>
  `;
}

function render() {
  if (state.page === "intro") return renderIntro();
  if (state.page === "test") return renderTest();
  if (state.page === "results") return renderResults();
}

function withScrollPreserved(fn) {
  const y = window.scrollY;
  fn();
  window.scrollTo(0, y);
}

function scrollToQuestions() {
  const doScroll = () => {
    const q = document.querySelector(".questions");
    if (!q) return;
    const firstQuestion = q.querySelector(".question");
    const navOffset = document.querySelector(".nav")?.offsetHeight || 56;
    const stickyHeader = document.querySelector(".test-head");
    const stickyOffset = stickyHeader ? stickyHeader.offsetHeight : 0;
    const anchor = firstQuestion || q;
    const y = anchor.getBoundingClientRect().top + window.scrollY - navOffset - stickyOffset - 24;
    window.scrollTo({ top: Math.max(0, y), behavior: "auto" });
  };
  requestAnimationFrame(doScroll);
  setTimeout(doScroll, 80);
  setTimeout(doScroll, 160);
}

document.addEventListener("input", (e) => {
  if (e.target && e.target.id === "name-input") {
    state.userName = e.target.value;
  }
});

document.addEventListener("click", (e) => {
  const target = e.target.closest("[data-action]");
  if (!target) return;
  const action = target.getAttribute("data-action");

  if (action === "begin") {
    state.page = "test";
    state.section = 0;
    render();
    scrollToQuestions();
    return;
  }

  if (action === "answer") {
    const id = target.getAttribute("data-id");
    const value = Number(target.getAttribute("data-value"));
    if (!id || !value) return;
    withScrollPreserved(() => {
      state.answers[id] = value;
      render();
    });
    return;
  }

  if (action === "back") {
    if (state.section > 0) state.section -= 1;
    else state.page = "intro";
    render();
    if (state.page === "test") scrollToQuestions();
    else window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }

  if (action === "next") {
    if (!isSectionComplete(state.section)) {
      alert("Please answer all questions in this section before proceeding.");
      return;
    }
    if (state.section < 2) {
      state.section += 1;
      render();
      scrollToQuestions();
    } else {
      computeResults();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    return;
  }

  if (action === "retake") {
    state.page = "intro";
    state.section = 0;
    state.answers = {};
    state.results = null;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
});

render();
</script>
<script>
(() => {
  const toggle = document.querySelector(".nav-toggle");
  const links = document.querySelector(".nav-links");
  if (!toggle || !links) return;
  if (toggle.dataset.navBound === "1") return;
  toggle.dataset.navBound = "1";

  const closeMenu = () => {
    links.classList.remove("open");
    toggle.classList.remove("open");
    document.body.classList.remove("nav-open");
  };

  toggle.addEventListener("click", () => {
    const willOpen = !links.classList.contains("open");
    if (willOpen) {
      links.classList.add("open");
      toggle.classList.add("open");
      document.body.classList.add("nav-open");
    } else {
      closeMenu();
    }
  });

  links.querySelectorAll("a").forEach((a) => a.addEventListener("click", closeMenu));
  window.addEventListener("resize", () => { if (window.innerWidth > 768) closeMenu(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeMenu(); });
})();
</script>
</body>
</html>
